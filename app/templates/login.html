{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white py-8 px-6 shadow rounded-lg sm:px-10">
        <h2 class="mb-6 text-center text-2xl font-bold text-gray-900">Entrar na sua conta</h2>
        {% if error %}
        <div class="mb-4 bg-red-100/50 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
            <span class="block sm:inline">{{ error }}</span>
        </div>
        {% endif %}
        <form class="space-y-6" action="/auth/login" method="POST">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Usuário</label>
                <div class="mt-1">
                    <input id="username" name="username" type="text" required
                        class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
                <div class="mt-1">
                    <input id="password" name="password" type="password" required
                        class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                </div>
            </div>
            <div>
                <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Entrar
                </button>
            </div>
        </form>
        <div class="mt-6 text-center text-sm text-gray-500 p-2 bg-gray-50 border rounded-md">
            Acesso restrito. Contate o Administrador para obter uma conta de acesso ao @Lab Niscios.
        </div>
    </div>
</div>
{% endblock %}
