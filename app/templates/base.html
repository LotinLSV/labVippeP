<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@Lab Niscios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="bg-gray-100 font-sans leading-normal tracking-normal text-gray-800">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8">
            <div class="relative flex justify-between h-16">
                <div class="absolute inset-y-0 left-0 flex items-center">
                    <a href="/" class="text-xl font-bold text-indigo-600">@Lab Niscios</a>
                </div>
                {% if user %}
                <div class="flex items-center space-x-4 ml-auto">
                    <a href="/" class="text-gray-700 hover:text-indigo-600 font-medium">Dashboard</a>
                    {% if user.is_admin or user.show_projects %}
                    <a href="/projects" class="text-gray-700 hover:text-indigo-600 font-medium">Projetos</a>
                    <a href="/projects/reports" class="text-gray-700 hover:text-indigo-600 font-medium">Relatórios</a>
                    {% endif %}
                    <a href="/chat" class="text-gray-700 hover:text-indigo-600 font-medium">Chat & Docs</a>
                    {% if user.is_admin %}
                    <a href="/admin/users"
                        class="text-red-600 font-bold hover:text-red-800 ml-4 border-l pl-4 border-gray-300">Painel
                        Admin</a>
                    {% endif %}
                    <span class="text-gray-500 ml-4">|</span>
                    <span class="text-sm ml-4">Olá, <b>{{ user.username }}</b></span>
                    <a href="/auth/logout" class="text-sm text-red-600 hover:text-red-800">Sair</a>
                </div>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
