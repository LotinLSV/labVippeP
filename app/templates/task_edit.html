{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-4">
        <a href="/projects/{{ project.id }}" class="text-sm text-indigo-600 hover:text-indigo-800">&larr; Voltar para Detalhes do Projeto</a>
    </div>

    <div class="bg-white shadow overflow-hidden sm:rounded-lg">
        <div class="px-4 py-5 sm:px-6 border-b">
            <h3 class="text-lg leading-6 font-medium text-gray-900">Editar Tarefa</h3>
            <p class="mt-1 text-sm text-gray-500">Projeto: {{ project.name }}</p>
        </div>
        <div class="p-6">
            <form action="/projects/{{ project.id }}/tasks/{{ task.id }}/edit" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nome da Tarefa</label>
                    <input type="text" name="name" value="{{ task.name }}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4 bg-gray-50 rounded-lg border">
                    <div>
                        <h4 class="text-sm font-bold text-gray-700 mb-3">Cronograma Previsto</h4>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-xs font-medium text-gray-500">Início Previsto</label>
                                <input type="date" name="start_date" value="{{ task.start_date.strftime('%Y-%m-%d') if task.start_date else '' }}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500">Término Previsto</label>
                                <input type="date" name="end_date" value="{{ task.end_date.strftime('%Y-%m-%d') if task.end_date else '' }}" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                            </div>
                        </div>
                    </div>
                    <div>
                        <h4 class="text-sm font-bold text-gray-700 mb-3">Linha de Base Real</h4>
                        <div class="space-y-3">
                            <div>
                                <label class="block text-xs font-medium text-gray-500">Início Real</label>
                                <input type="date" name="actual_start_date" value="{{ task.actual_start_date.strftime('%Y-%m-%d') if task.actual_start_date else '' }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500">Término Real</label>
                                <input type="date" name="actual_end_date" value="{{ task.actual_end_date.strftime('%Y-%m-%d') if task.actual_end_date else '' }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Status</label>
                        <select name="status" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border bg-white">
                            <option value="A Fazer" {% if task.status == 'A Fazer' %}selected{% endif %}>A Fazer</option>
                            <option value="Em Andamento" {% if task.status == 'Em Andamento' %}selected{% endif %}>Em Andamento</option>
                            <option value="Impedido" {% if task.status == 'Impedido' %}selected{% endif %}>Impedido</option>
                            <option value="Concluído" {% if task.status == 'Concluído' %}selected{% endif %}>Concluído</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Percentual de Conclusão (%)</label>
                        <input type="number" min="0" max="100" step="0.1" name="percentage" value="{{ task.percentage }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border">
                        <p class="text-xs text-gray-500 mt-1">Informe a média do avanço (0 a 100)</p>
                    </div>
                </div>

                <div class="flex justify-end pt-4 border-t">
                    <a href="/projects/{{ project.id }}" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300 mr-2">Cancelar</a>
                    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-md hover:bg-indigo-700 font-medium">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
